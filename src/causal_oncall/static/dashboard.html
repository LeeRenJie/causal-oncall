<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Causal On-Call: Self-Improvement</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; margin: 0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .sponsor-footer {
    margin-top: 32px; padding: 16px 0; text-align: center; width: 100%;
  }
  .sponsor-footer .pre {
    color: #6e7681; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.4px; margin-bottom: 10px;
  }
  .sponsor-footer .badges {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .sponsor-footer .badge {
    padding: 5px 12px; border-radius: 999px; font-size: 11px;
    font-weight: 600; border: 1px solid currentColor;
  }
  .sponsor-footer .badge-dynatrace { color: #1496ff; background: rgba(20, 150, 255, 0.08); }
  .sponsor-footer .badge-gcp       { color: #4285f4; background: rgba(66, 133, 244, 0.08); }
  .sponsor-footer .badge-gemini    { color: #ab7df8; background: rgba(171, 125, 248, 0.10); }
  .sponsor-footer .badge-mongo     { color: #56d364; background: rgba(86, 211, 100, 0.10); }
  .sponsor-footer .badge-phoenix   { color: #f78166; background: rgba(247, 129, 102, 0.10); }
  .sponsor-footer .badge-cloudrun  { color: #fbbc04; background: rgba(251, 188, 4, 0.10); }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 40px 56px; max-width: 720px; width: 90%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  h1 {
    color: #58a6ff; font-size: 14px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.2px; margin: 0 0 4px;
  }
  .tagline { color: #8b949e; font-size: 13px; margin: 0 0 32px; }
  .headline {
    text-align: center; margin: 16px 0 8px;
  }
  .headline .label {
    color: #8b949e; font-size: 13px; text-transform: uppercase;
    letter-spacing: 1.4px; margin-bottom: 4px;
  }
  .headline .number {
    font-size: 64px; font-weight: 700; color: #56d364;
    line-height: 1.0; font-variant-numeric: tabular-nums;
  }
  .headline .qualifier { color: #c9d1d9; font-size: 16px; margin-top: 4px; }
  .caption {
    text-align: center; color: #8b949e; font-size: 13px;
    margin: 8px 0 24px;
  }
  .caption .delta { color: #56d364; font-weight: 600; }
  .sparkline-wrap {
    background: #0d1117; border-radius: 8px; padding: 20px 12px;
    border: 1px solid #21262d;
  }
  .sparkline-wrap svg { display: block; width: 100%; height: 120px; }
  .subtitle {
    text-align: center; color: #8b949e; font-size: 12px;
    margin-top: 16px; font-variant-numeric: tabular-nums;
  }
  .footer {
    text-align: center; color: #484f58; font-size: 11px;
    margin-top: 24px; text-transform: uppercase; letter-spacing: 1.2px;
  }
  .footer .live { color: #56d364; }
</style>
</head>
<body>
<div class="card">
  <h1>Causal On-Call: Self-Improvement</h1>
  <p class="tagline">Rolling top-hypothesis accuracy from human-confirmed outcomes.</p>

  <div class="headline">
    <div class="label">top-hypothesis correct</div>
    <div class="number" id="accuracy">--%</div>
  </div>
  <div class="caption" id="caption">awaiting data&hellip;</div>

  <div class="sparkline-wrap">
    <svg id="spark" viewBox="0 0 600 120" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg" aria-label="30-day accuracy trend"></svg>
  </div>

  <div class="subtitle" id="subtitle">--</div>
  <div class="footer">auto-refreshes every 30s &middot; <span class="live">live</span></div>
</div>
<footer class="sponsor-footer">
  <div class="pre">Powered by</div>
  <div class="badges">
    <span class="badge badge-dynatrace">Dynatrace</span>
    <span class="badge badge-gcp">Google Cloud Agent Builder</span>
    <span class="badge badge-gemini">Gemini 3</span>
    <span class="badge badge-mongo">MongoDB Atlas</span>
    <span class="badge badge-phoenix">Arize Phoenix</span>
    <span class="badge badge-cloudrun">Cloud Run</span>
  </div>
</footer>
<script>
(function () {
  var qs = new URLSearchParams(window.location.search);
  var demo = qs.get('demo') === 'true';
  var dataUrl = '/dashboard/data' + (demo ? '?demo=true' : '');

  function pct(v) { return Math.round((v || 0) * 100) + '%'; }

  function renderSparkline(trend) {
    var svg = document.getElementById('spark');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    var W = 600, H = 120, PAD = 6;
    var n = trend.length;
    if (n < 2) { return; }
    var minV = 0, maxV = 1;
    var stepX = (W - 2 * PAD) / (n - 1);
    var pts = [];
    for (var i = 0; i < n; i++) {
      var x = PAD + i * stepX;
      var y = H - PAD - ((trend[i] - minV) / (maxV - minV)) * (H - 2 * PAD);
      pts.push(x.toFixed(2) + ',' + y.toFixed(2));
    }
    var NS = 'http://www.w3.org/2000/svg';
    // Gradient fill under the line.
    var defs = document.createElementNS(NS, 'defs');
    defs.innerHTML =
      '<linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#56d364" stop-opacity="0.45"/>' +
      '<stop offset="100%" stop-color="#56d364" stop-opacity="0"/>' +
      '</linearGradient>';
    svg.appendChild(defs);
    var area = document.createElementNS(NS, 'polygon');
    var areaPts = pts.slice();
    areaPts.unshift(PAD + ',' + (H - PAD));
    areaPts.push((W - PAD) + ',' + (H - PAD));
    area.setAttribute('points', areaPts.join(' '));
    area.setAttribute('fill', 'url(#g)');
    svg.appendChild(area);
    // Trend polyline.
    var line = document.createElementNS(NS, 'polyline');
    line.setAttribute('points', pts.join(' '));
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', '#56d364');
    line.setAttribute('stroke-width', '2.5');
    line.setAttribute('stroke-linejoin', 'round');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
    // Final dot.
    var last = pts[pts.length - 1].split(',');
    var dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', last[0]);
    dot.setAttribute('cy', last[1]);
    dot.setAttribute('r', '4');
    dot.setAttribute('fill', '#56d364');
    svg.appendChild(dot);
  }

  function render(data) {
    document.getElementById('accuracy').textContent = pct(data.rolling_accuracy);
    var start = pct(data.starting_accuracy || 0);
    document.getElementById('caption').innerHTML =
      'up from <span class="delta">' + start + '</span> in month 1';
    document.getElementById('subtitle').textContent =
      data.total_briefs + ' briefs over ' + (data.trend_length || 30) +
      ' days &middot; ' + data.confirmed_count + ' human-confirmed';
    renderSparkline(data.trend || []);
  }

  function refresh() {
    fetch(dataUrl, { headers: { 'accept': 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(render)
      .catch(function () { /* keep last good render */ });
  }

  refresh();
  setInterval(refresh, 30000);
})();
</script>
</body>
</html>
