<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Causal On-Call: Self-Improvement</title>
<style>
  :root {
    color-scheme: dark;

    /* Color tokens (DESIGN.md — Restrained palette, OKLCH only) */
    --bg: oklch(14% 0.01 250);
    --surface: oklch(18% 0.012 250);
    --surface-2: oklch(22% 0.014 250);
    --border: oklch(28% 0.015 250);
    --text: oklch(94% 0.008 250);
    --text-muted: oklch(68% 0.012 250);
    --accent: oklch(78% 0.18 145);
    --accent-soft: oklch(78% 0.18 145 / 0.12);

    --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    --font-sans: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: var(--bg); color: var(--text); margin: 0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 40px 56px; max-width: 720px; width: 90%;
  }
  h1 {
    color: var(--text-muted); font-family: var(--font-mono);
    font-size: 0.75rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 6px;
  }
  .tagline { color: var(--text-muted); font-size: 0.875rem; margin: 0 0 32px; }
  .headline { text-align: center; margin: 16px 0 8px; }
  .headline .label {
    color: var(--text-muted); font-family: var(--font-mono);
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .headline .number {
    font-size: 4rem; font-weight: 700; color: var(--accent);
    line-height: 1.0; font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }
  .headline .qualifier { color: var(--text); font-size: 1rem; margin-top: 4px; }
  .caption {
    text-align: center; color: var(--text-muted); font-size: 0.875rem;
    margin: 8px 0 24px;
  }
  .caption .delta { color: var(--accent); font-weight: 600; font-family: var(--font-mono); }
  .sparkline-wrap {
    background: var(--bg); border-radius: 4px; padding: 20px 12px;
    border: 1px solid var(--border);
  }
  .sparkline-wrap svg { display: block; width: 100%; height: 120px; }
  .subtitle {
    text-align: center; color: var(--text-muted); font-size: 0.75rem;
    margin-top: 16px; font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }
  .footer {
    text-align: center; color: var(--text-muted); font-size: 0.75rem;
    margin-top: 24px; text-transform: uppercase; letter-spacing: 0.08em;
    font-family: var(--font-mono);
  }
  .footer .live { color: var(--accent); }

  /* Sponsor footer — matches landing v2 */
  .sponsor-footer {
    margin-top: 48px; padding: 24px 32px 0; text-align: center; width: 100%;
    max-width: 720px;
  }
  .sponsor-pre {
    color: var(--text-muted); font-family: var(--font-mono);
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.08em; margin: 0 0 14px;
  }
  .sponsor-row {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center;
  }
  .sponsor-pill {
    font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
    border: 1px solid var(--border); padding: 6px 12px; border-radius: 999px;
    background: transparent;
    transition: transform 150ms ease, border-color 150ms ease, color 150ms ease;
  }
  .sponsor-pill:hover {
    transform: translateY(-1px); border-color: var(--text-muted); color: var(--text);
  }
  .sponsor-divider {
    color: var(--border); font-family: var(--font-mono); font-size: 0.75rem;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Causal On-Call: Self-Improvement</h1>
  <p class="tagline">Rolling top-hypothesis accuracy from human-confirmed outcomes.</p>

  <div class="headline">
    <div class="label">top-hypothesis correct</div>
    <div class="number" id="accuracy">--%</div>
  </div>
  <div class="caption" id="caption">awaiting data&hellip;</div>

  <div class="sparkline-wrap">
    <svg id="spark" viewBox="0 0 600 120" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg" aria-label="30-day accuracy trend"></svg>
  </div>

  <div class="subtitle" id="subtitle">--</div>
  <div class="footer">auto-refreshes every 30s &middot; <span class="live">live</span></div>
</div>
<footer class="sponsor-footer">
  <p class="sponsor-pre">Powered by</p>
  <div class="sponsor-row">
    <span class="sponsor-pill">Dynatrace</span>
    <span class="sponsor-divider">·</span>
    <span class="sponsor-pill">Google Cloud Agent Builder</span>
    <span class="sponsor-divider">·</span>
    <span class="sponsor-pill">Gemini 3</span>
    <span class="sponsor-divider">·</span>
    <span class="sponsor-pill">MongoDB Atlas</span>
    <span class="sponsor-divider">·</span>
    <span class="sponsor-pill">Arize Phoenix</span>
  </div>
</footer>
<script>
(function () {
  var qs = new URLSearchParams(window.location.search);
  var demo = qs.get('demo') === 'true';
  var dataUrl = '/dashboard/data' + (demo ? '?demo=true' : '');

  function pct(v) { return Math.round((v || 0) * 100) + '%'; }

  function renderSparkline(trend) {
    var svg = document.getElementById('spark');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    var W = 600, H = 120, PAD = 6;
    var n = trend.length;
    if (n < 2) { return; }
    var minV = 0, maxV = 1;
    var stepX = (W - 2 * PAD) / (n - 1);
    var pts = [];
    for (var i = 0; i < n; i++) {
      var x = PAD + i * stepX;
      var y = H - PAD - ((trend[i] - minV) / (maxV - minV)) * (H - 2 * PAD);
      pts.push(x.toFixed(2) + ',' + y.toFixed(2));
    }
    var NS = 'http://www.w3.org/2000/svg';
    // Gradient fill under the line.
    var defs = document.createElementNS(NS, 'defs');
    defs.innerHTML =
      '<linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="oklch(78% 0.18 145)" stop-opacity="0.4"/>' +
      '<stop offset="100%" stop-color="oklch(78% 0.18 145)" stop-opacity="0"/>' +
      '</linearGradient>';
    svg.appendChild(defs);
    var area = document.createElementNS(NS, 'polygon');
    var areaPts = pts.slice();
    areaPts.unshift(PAD + ',' + (H - PAD));
    areaPts.push((W - PAD) + ',' + (H - PAD));
    area.setAttribute('points', areaPts.join(' '));
    area.setAttribute('fill', 'url(#g)');
    svg.appendChild(area);
    // Trend polyline.
    var line = document.createElementNS(NS, 'polyline');
    line.setAttribute('points', pts.join(' '));
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', 'oklch(78% 0.18 145)');
    line.setAttribute('stroke-width', '2.5');
    line.setAttribute('stroke-linejoin', 'round');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
    // Final dot.
    var last = pts[pts.length - 1].split(',');
    var dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', last[0]);
    dot.setAttribute('cy', last[1]);
    dot.setAttribute('r', '4');
    dot.setAttribute('fill', 'oklch(78% 0.18 145)');
    svg.appendChild(dot);
  }

  function render(data) {
    document.getElementById('accuracy').textContent = pct(data.rolling_accuracy);
    var start = pct(data.starting_accuracy || 0);
    document.getElementById('caption').innerHTML =
      'up from <span class="delta">' + start + '</span> in month 1';
    document.getElementById('subtitle').textContent =
      data.total_briefs + ' briefs over ' + (data.trend_length || 30) +
      ' days &middot; ' + data.confirmed_count + ' human-confirmed';
    renderSparkline(data.trend || []);
  }

  function refresh() {
    fetch(dataUrl, { headers: { 'accept': 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(render)
      .catch(function () { /* keep last good render */ });
  }

  refresh();
  setInterval(refresh, 30000);
})();
</script>
</body>
</html>
