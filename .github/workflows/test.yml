name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage gate (100% line + branch)
        env:
          # The unit and integration suites must not require credentials.
          # Contract tests that need real Dynatrace / Mongo are marked
          # `requires_creds` and deselected here.
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -m "not requires_creds" \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest.xml

      - name: Publish coverage as job summary
        if: always()
        run: |
          {
            echo "## Coverage";
            python -c "import xml.etree.ElementTree as ET; \
              r = ET.parse('coverage.xml').getroot(); \
              print(f\"line: {float(r.attrib['line-rate']) * 100:.2f}%\"); \
              print(f\"branch: {float(r.attrib['branch-rate']) * 100:.2f}%\")";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            pytest.xml
          retention-days: 14
